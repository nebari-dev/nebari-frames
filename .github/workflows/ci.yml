name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint proto
        working-directory: proto
        run: buf lint
      - name: Generated code is up to date
        run: |
          (cd proto && buf generate)
          git add -A gen/
          if ! git diff --cached --exit-code -- gen/; then
            echo "::error::Generated code is stale. Run 'make proto' and commit the result."
            exit 1
          fi

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to a minor series: a new golangci-lint release can add
          # default linters and redden every PR overnight. Bump deliberately.
          version: v2.12
      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint chart
        run: helm lint chart/
      - name: Template renders (NebariApp mode)
        run: |
          helm template frames chart/ \
            --set nebariapp.enabled=true \
            --set nebariapp.hostname=frames.example.com \
            --set seed.orgSlug=test-org \
            --set seed.adminEmail=admin@example.com \
            > /tmp/render-nebariapp.yaml
      - name: Template renders (dev mode)
        run: |
          helm template frames chart/ --set auth.devMode=true \
            > /tmp/render-devmode.yaml
      - name: Validate rendered manifests (kubeconform)
        run: |
          # -ignore-missing-schemas is required because the NebariApp CRD has
          # no published JSON schema anywhere; do not remove this flag without
          # publishing one first.
          for f in /tmp/render-nebariapp.yaml /tmp/render-devmode.yaml; do
            echo "::group::kubeconform ${f}"
            # Pinned for the same reason golangci-lint is: a new release must
            # not change gate behavior without a deliberate bump. v0.8+ needs
            # go >= 1.26, which setup-go's GOTOOLCHAIN=local forbids on this
            # repo's go 1.25 toolchain; bump both together.
            go run github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0 \
              -strict -summary -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
              "${f}"
            echo "::endgroup::"
          done

  e2e-sandbox:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Build frames image
        run: docker build --platform=linux/amd64 -t nebari-frames:e2e .

      - uses: nebari-dev/action-nebari-sandbox@v2
        id: sandbox
        with:
          profile: platform

      - name: Import image into the sandbox cluster
        run: k3d image import nebari-frames:e2e -c ${{ steps.sandbox.outputs.cluster-name }}

      - name: Deploy frames via GitOps
        env:
          GITOPS_DIR: ${{ steps.sandbox.outputs.gitops-dir }}
        run: |
          cp -r chart "${GITOPS_DIR}/nebari-frames-chart"
          cat > "${GITOPS_DIR}/apps/nebari-frames.yaml" <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: nebari-frames
            namespace: argocd
          spec:
            project: default
            source:
              repoURL: "file://${GITOPS_DIR}"
              targetRevision: HEAD
              path: nebari-frames-chart
              helm:
                releaseName: nebari-frames
                values: |
                  image:
                    repository: nebari-frames
                    tag: e2e
                  # Auth runs in dev mode: the app's OIDC readiness check needs
                  # to reach the issuer (https://keycloak.nebari.local) from
                  # inside the pod, but the sandbox has no in-cluster DNS for
                  # *.nebari.local and its CA is self-signed, so /readyz stays
                  # 503 forever with real auth. Routing, TLS, and the gateway
                  # path are still fully exercised via the NebariApp.
                  nebariapp:
                    enabled: true
                    hostname: frames.nebari.local
                    auth:
                      enabled: false
                  auth:
                    devMode: true
                  seed:
                    orgSlug: e2e-org
                    orgDisplayName: E2E Org
                    adminEmail: e2e@example.com
            destination:
              server: https://kubernetes.default.svc
              namespace: nebari-frames
            syncPolicy:
              # The operator only manages apps in namespaces that opt in with
              # this label; without it, spec validation fails silently and the
              # OIDC client secret is never provisioned (mirrors production).
              managedNamespaceMetadata:
                labels:
                  nebari.dev/managed: "true"
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
                - SkipDryRunOnMissingResource=true
          EOF
          git -C "${GITOPS_DIR}" add -A
          git -C "${GITOPS_DIR}" \
            -c user.email=ci@nebari-frames \
            -c user.name=frames-e2e \
            commit -m "test: deploy nebari-frames e2e"
          chmod -R a+rX "${GITOPS_DIR}"

      - name: Wait for Application Synced and Healthy
        env:
          KUBECONFIG: ${{ steps.sandbox.outputs.kubeconfig }}
        run: |
          SUCCESS=0
          DEGRADED=0
          for i in $(seq 1 90); do
            SYNC=$(kubectl get application/nebari-frames -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "NotFound")
            HEALTH=$(kubectl get application/nebari-frames -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "-")
            echo "[${i}/90] sync=${SYNC} health=${HEALTH}"
            if [ "${SYNC}" = "Synced" ] && [ "${HEALTH}" = "Healthy" ]; then
              SUCCESS=1
              break
            fi
            # Fail fast only on SUSTAINED Degraded: apps pass through Degraded
            # transiently while pods start, so a single sample is not a verdict.
            if [ "${HEALTH}" = "Degraded" ]; then
              DEGRADED=$((DEGRADED + 1))
            else
              DEGRADED=0
            fi
            if [ "${DEGRADED}" -ge 12 ]; then
              echo "::error::Application stuck Degraded for 2 minutes, failing fast"
              break
            fi
            sleep 10
          done
          if [ "${SUCCESS}" = "1" ]; then
            exit 0
          fi
          echo "::error::Application never reached Synced/Healthy"
          kubectl get application/nebari-frames -n argocd -o yaml || true
          kubectl -n nebari-frames get pods -o wide || true
          kubectl -n nebari-frames describe pods || true
          echo "=== NebariApp CR (operator's view of auth provisioning) ==="
          kubectl -n nebari-frames get nebariapps.reconcilers.nebari.dev -o yaml || true
          echo "=== Secrets in nebari-frames namespace ==="
          kubectl -n nebari-frames get secrets || true
          echo "=== frames pod logs (tail) ==="
          kubectl -n nebari-frames logs --tail=100 deploy/nebari-frames-nebari-frames 2>/dev/null || true
          echo "=== Operator pods ==="
          kubectl get pods -A | grep -i operator || true
          echo "=== Operator Keycloak wiring (env) ==="
          kubectl -n nebari-operator-system get deploy nebari-operator-controller-manager \
            -o jsonpath='{.spec.template.spec.containers[*].env}' 2>/dev/null || true
          echo ""
          echo "=== nebari-operator logs (tail) ==="
          kubectl -n nebari-operator-system logs --tail=150 -l control-plane=controller-manager 2>/dev/null \
            || kubectl -n nebari-operator-system logs --tail=150 deploy/nebari-operator-controller-manager 2>/dev/null \
            || true
          exit 1

      - name: Endpoint answers through the gateway
        env:
          GATEWAY_IP: ${{ steps.sandbox.outputs.gateway-ip }}
        run: |
          CODE=$(curl -sk -o /tmp/resp -w '%{http_code}' \
            --max-time 30 \
            --resolve "frames.nebari.local:443:${GATEWAY_IP}" \
            https://frames.nebari.local/ || echo 000)
          echo "HTTP ${CODE}"
          head -c 500 /tmp/resp; echo
          case "${CODE}" in
            200|302|303|307) echo "endpoint OK" ;;
            *) echo "::error::unexpected HTTP ${CODE}"; exit 1 ;;
          esac

      - name: Cleanup
        if: always()
        run: k3d cluster delete ${{ steps.sandbox.outputs.cluster-name }} || true
