apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nebari-frames
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://nebari-dev.github.io/helm-repository
    chart: nebari-frames
    targetRevision: 0.1.0
    helm:
      valueFiles:
        - values.yaml
      values: |
        nebariapp:
          enabled: true
          hostname: frames.example.nebari.dev
          auth:
            enabled: true
        seed:
          orgSlug: openteams
          orgDisplayName: OpenTeams
          adminEmail: admin@example.com
  destination:
    server: https://kubernetes.default.svc
    namespace: nebari-frames
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
