apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nebari-frames
  namespace: argocd
spec:
  project: default
  source:
    # Released chart from the Nebari Helm registry. image.tag defaults to the
    # chart's appVersion, so chart and image versions move together; bump
    # targetRevision to upgrade.
    chart: nebari-frames
    repoURL: quay.io/nebari/charts
    targetRevision: 0.1.5
    helm:
      values: |
        nebariapp:
          enabled: true
          hostname: REPLACE_ME.example.nebari.dev
          gateway: public
          auth:
            enabled: true
        seed:
          orgSlug: openteams
          orgDisplayName: OpenTeams
          adminEmail: REPLACE_ME@example.com
        mcp:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: nebari-frames
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
