apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nebari-frames
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nebari-dev/nebari-frames.git
    targetRevision: main
    path: chart
    helm:
      values: |
        nebariapp:
          enabled: true
          hostname: REPLACE_ME.example.nebari.dev
          gateway: public
          auth:
            enabled: true
        seed:
          orgSlug: openteams
          orgDisplayName: OpenTeams
          adminEmail: REPLACE_ME@example.com
        mcp:
          enabled: true
        image:
          tag: REPLACE_ME   # the pushed <IMG_TAG> from Task 6
  destination:
    server: https://kubernetes.default.svc
    namespace: nebari-frames
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
