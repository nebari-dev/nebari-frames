apiVersion: v1
kind: Service
metadata:
  name: {{ include "nebari-frames.fullname" . }}
  labels:
    {{- include "nebari-frames.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nebari-frames.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
