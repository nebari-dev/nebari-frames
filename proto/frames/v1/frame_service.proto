syntax = "proto3";
package frames.v1;

import "frames/v1/frame.proto";

option go_package = "github.com/nebari-dev/nebari-frames/gen/go/frames/v1;framesv1";

service FrameService {
  // Write - publisher/admin only. Org is derived from the caller.
  rpc PublishFrame(PublishFrameRequest) returns (PublishFrameResponse);
  // Read - server-filtered to frames the caller may read in their org.
  rpc ListFrames(ListFramesRequest) returns (ListFramesResponse);
  // Read - 404 if caller lacks read or frame is absent.
  rpc GetFrame(GetFrameRequest) returns (GetFrameResponse);
  // Read - returns the inheritance-merged frame.
  rpc ResolveFrame(ResolveFrameRequest) returns (ResolveFrameResponse);
  // Identity + org + role for the calling user.
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
  // Read - lists a frame's published versions, newest first. 404 if no read.
  rpc ListFrameVersions(ListFrameVersionsRequest) returns (ListFrameVersionsResponse);
  // Write - delete a frame. Blocks if the frame is a parent unless force=true.
  rpc DeleteFrame(DeleteFrameRequest) returns (DeleteFrameResponse);
  // Admin only - list the caller's org members.
  rpc ListOrgMembers(ListOrgMembersRequest) returns (ListOrgMembersResponse);
  // Admin only - add a member to the caller's org by email (pending until login).
  rpc AddOrgMember(AddOrgMemberRequest) returns (AddOrgMemberResponse);
  // Admin only - change a member's role.
  rpc SetMemberRole(SetMemberRoleRequest) returns (SetMemberRoleResponse);
  // Admin only - remove a member from the caller's org.
  rpc RemoveOrgMember(RemoveOrgMemberRequest) returns (RemoveOrgMemberResponse);
}

message PublishFrameRequest {
  bytes content = 1;   // full YAML; name/version/extends/excludes/slots parsed server-side
  string changelog = 2;
}
message PublishFrameResponse {
  Frame frame = 1;
  FrameVersion version = 2;
}

message ListFramesRequest {}
message ListFramesResponse {
  repeated FrameSummary frames = 1;
  bool can_create = 2;
}

message GetFrameRequest {
  string org_slug = 1;
  string name = 2;
  string version = 3; // empty = latest
}
message GetFrameResponse {
  Frame frame = 1;
  FrameVersion version = 2;
  repeated ParentRef extends = 3;
  repeated string excludes = 4;
  Permissions permissions = 5;
}

message ResolveFrameRequest {
  string org_slug = 1;
  string name = 2;
  string version = 3; // empty = latest
}
message ResolveFrameResponse {
  bytes resolved_content = 1; // merged YAML
}

message GetMeRequest {}
message GetMeResponse {
  string subject = 1;
  string email = 2;
  Org org = 3;
  string role = 4;
  bool can_create = 5;
}

message ListFrameVersionsRequest {
  string org_slug = 1;
  string name = 2;
}
message ListFrameVersionsResponse {
  repeated FrameVersionSummary versions = 1;
}

// FieldViolation is one validation failure at a specific field path
// (e.g. "slots.terminology[2].definition", matching backend validate.go paths).
message FieldViolation {
  string field = 1;
  string message = 2;
}
// FieldViolations is attached as a Connect error detail on PublishFrame when
// schema validation fails, so clients can map failures to individual inputs.
message FieldViolations {
  repeated FieldViolation violations = 1;
}

message DeleteFrameRequest {
  string org_slug = 1;
  string name = 2;
  bool force = 3; // detach dependent extends edges then delete
}
message DeleteFrameResponse {}

// DeleteBlocked is attached as a Connect error detail on DeleteFrame when the
// target is a parent of other frames and force=false.
message DeleteBlocked {
  repeated string blocking_frames = 1; // "org_slug/name" of frames that extend the target
}

message ListOrgMembersRequest {}
message ListOrgMembersResponse {
  repeated Membership members = 1;
}

message AddOrgMemberRequest {
  string email = 1;
  string role = 2; // "viewer" | "publisher" | "admin"
}
message AddOrgMemberResponse {
  Membership member = 1;
}

// Identify a member by user_sub (active) or email (pending). Exactly one is set.
message SetMemberRoleRequest {
  string user_sub = 1;
  string email = 2;
  string role = 3;
}
message SetMemberRoleResponse {
  Membership member = 1;
}

message RemoveOrgMemberRequest {
  string user_sub = 1;
  string email = 2;
}
message RemoveOrgMemberResponse {}
